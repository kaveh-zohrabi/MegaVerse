# MegaVerse Helm Values

## Global Settings
global:
  imageRegistry: ghcr.io/megaverse
  imagePullSecrets: []

## API Gateway
apiGateway:
  enabled: true
  replicaCount: 3
  image:
    repository: api-gateway
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

## Auth Service
authService:
  enabled: true
  replicaCount: 3
  image:
    repository: auth-service
    tag: latest
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

## User Service
userService:
  enabled: true
  replicaCount: 3
  image:
    repository: user-service
    tag: latest
  service:
    type: ClusterIP
    port: 8082

## Databases
postgresql:
  enabled: true
  auth:
    postgresPassword: changeme
    database: megaverse

redis:
  enabled: true
  auth:
    enabled: false

elasticsearch:
  enabled: true

kafka:
  enabled: true
